name: Mac

on:
  push:
  pull_request:
  merge_group:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  mac_m1_install:
    runs-on: macos-15  # arm64, updated from macos-14

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4  # updated from v3

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          # No CONDA_SUBDIR: osx-64 — run native arm64

      - name: Update setuptools
        shell: bash -el {0}
        run: |
          bash install_mirar.sh mirar

      - name: Verify tools
        shell: bash -el {0}
        run: |
          conda activate mirar
          solve-field --version
          swarp -v
          psfex -v
          sex -v
          scamp -v
          python --version
 
      - name: Run doc tests
        shell: bash -el {0}
        run: |
          conda activate mirar-ci
          poetry run make -C docs/ doctest
