name: Mac

on:
  push:
  pull_request:
  merge_group:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  mac_m1_install:
    runs-on: macos-15  # arm64, updated from macos-14

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4  # updated from v3

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          # No CONDA_SUBDIR: osx-64 — run native arm64

      - name: Update setuptools
        shell: bash -el {0}
        run: |
          conda install -c conda-forge pip
          python -m pip install --upgrade pip setuptools wheel packaging platformdirs setuptools-scm
          python -m pip install --user pipx
          python -m pipx install poetry

      - name: Install python packages with poetry
        shell: bash -el {0}
        env:
          SETUPTOOLS_SCM_SUBPROCESS_TIMEOUT: 120
        run: |
          poetry install -E dev

      - name: Install conda packages (native arm64)
        shell: bash -el {0}
        run: |
          conda install -c conda-forge \
            astromatic-source-extractor \
            astromatic-scamp \
            gsl \
            cfitsio fftw openblas \
            autoconf automake libtool pkg-config
          sex -v
          scamp -v

      - name: Install astrometry.net (Homebrew, native arm64)
        run: |
          brew install astrometry-net
          solve-field --version

      - name: Build SWarp from source (links against conda deps)
        shell: bash -el {0}
        run: |
          git clone --depth 1 https://github.com/astromatic/swarp.git
          cd swarp
          sh autogen.sh
          ./configure \
            --prefix=$CONDA_PREFIX \
            --with-cfitsio-incdir=$CONDA_PREFIX/include \
            --with-cfitsio-libdir=$CONDA_PREFIX/lib
          make -j$(sysctl -n hw.logicalcpu)
          make install
          swarp -v

      - name: Build PSFex from source (links against conda deps)
        shell: bash -el {0}
        run: |
          git clone --depth 1 https://github.com/astromatic/psfex.git
          cd psfex
          sh autogen.sh
          ./configure \
            --prefix=$CONDA_PREFIX \
            --enable-openblas \
            --with-openblas-libdir=$CONDA_PREFIX/lib \
            --with-openblas-incdir=$CONDA_PREFIX/include \
            --with-fftw-incdir=$CONDA_PREFIX/include \
            --with-fftw-libdir=$CONDA_PREFIX/lib
          make -j$(sysctl -n hw.logicalcpu)
          make install
          psfex -v

      - name: Run doc tests
        shell: bash -el {0}
        run: |
          poetry run make -C docs/ doctest
